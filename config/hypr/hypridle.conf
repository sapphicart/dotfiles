general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 30                                 # 30secs.
    on-timeout = brightnessctl -s set 10         # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r                 # monitor backlight restore.
}


# Idle warning
listener {
   timeout = 240
   on-timeout = notify-send -i $iDIR " Locking in 1 minute... "
   on-resume = notify-send -i $iDIR " Oh! you're back " " Hello !!! "
}


# Lock the screen (5 min)
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Volume mute on lock
listener {
    timeout = 300
    on-timeout = loginctl lock-session && pactl set-sink-mute @DEFAULT_SINK@ 1
    on-resume = pactl set-sink-mute @DEFAULT_SINK@ 0
}

# Turn off screen (10 min)
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend the system (20 min)
listener {
    timeout = 1200
    on-timeout = systemctl suspend
}

