$font = FantasqueSansM Nerd Font

# ==============================================================================
# GENERAL SETTINGS
# ==============================================================================

general {
    hide_cursor = false
    grace = 0
    disable_loading_bar = false
}

# ==============================================================================
# BACKGROUND
# ==============================================================================

background {
    monitor =
    path = ~/Pictures/kaguyahime037.jpg
    blur_passes = 1
    blur_size = 2
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.1
}

# ==============================================================================
# TIME
# ==============================================================================

# Time glow effect
label {
    monitor =
    text = $TIME
    color = rgba(203, 166, 247, 0.3)
    font_size = 105
    font_family = $font
    position = 2, -52
    halign = center
    valign = top
}

# Time display
label {
    monitor =
    text = $TIME
    color = $text
    font_size = 100
    font_family = $font
    position = 0, -50
    halign = center
    valign = top
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(203, 166, 247, 0.6)
}

# ==============================================================================
# DATE
# ==============================================================================
label {
    monitor = 
    text = cmd[update:3600000] date +"%A, %d %B %Y"
    color = rgba(203, 166, 247, 0.3)
    font_size = 30
    font_family = $font
    position = 0, -202
    halign = center
    valign = top
}


label {
    monitor =
    text = cmd[update:3600000] date +"%A, %d %B %Y"
    font_size = 25
    color = $text
    font_family = $font
    position = 0, -200
    halign = center
    valign = top
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(203, 166, 247, 0.6)
}


# ==============================================================================
# SYSTEM STATUS
# ==============================================================================

# CPU Usage
label {
    monitor =
    text = cmd[update:2000] echo "CPU: $(top -bn1 | grep "Cpu(s)" | sed "s/.*, *\([0-9.]*\)%* id.*/\1/" | awk '{print 100 - $1}' | cut -d. -f1)%"
    color = $peach
    font_size = 15
    font_family = $font
    position = -30, -35
    halign = right
    valign = top
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(250, 179, 135, 0.3)
}

# RAM Usage
label {
    monitor =
    text = cmd[update:3000] free | grep Mem | awk '{printf "RAM: %.0f%%", $3/$2 * 100.0}'
    color = $yellow
    font_size = 15
    font_family = $font
    position = -30, -58
    halign = right
    valign = top
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(250, 227, 176, 0.3)
}

#===============================================================================
# AVATAR
# ==============================================================================

# Avatar
image {
    monitor =
    path = ~/.config/hypr/hyprlock/profile.jpg
    size = 200
    border_size = 3
    position = 0, 50
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(242, 126, 190, 0.5)
}

# ==============================================================================
# WELCOME MESSAGE
# ==============================================================================

label {
    monitor =
    text = Welcome back, Shruti
    color = $text
    font_size = 20
    font_family = $font
    position = 0, -100
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(242, 182, 226, 0.3)
}

# ==============================================================================
# INPUT FIELD
# ==============================================================================

input-field {
    monitor =
    size = 330, 45
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    inner_color = rgba(240, 240, 242, 1)
    font_color = $text
    font_family = $font
    font_size = 18
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = Enter Password
    hide_input = false
    check_color = rgba(154, 191, 128, 1)
    fail_color = rgba(217, 95, 24, 1)
    fail_text = Authentication Failed! ($ATTEMPTS)
    capslock_color = rgba(242, 126, 190, 1)
    position = 0, -160
    halign = center
    valign = center
    shadow_passes = 4
    shadow_size = 10
    shadow_color = rgba(139, 125, 255, 0.4)
}

